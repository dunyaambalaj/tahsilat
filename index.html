/ cover no-repeat;display:flex;align-items:flex-end;justify-content:center;padding-bottom:40px;z-index:9999;}
.login-box{background:rgba(255,255,255,0.97);border-radius:18px;padding:32px 28px;width:100%;max-width:360px;margin:0 16px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.35);backdrop-filter:blur(4px);}
.login-logo{font-size:.65rem;font-weight:700;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;margin-bottom:6px;}
.login-title{font-size:1.4rem;font-weight:700;color:var(--dark);margin-bottom:4px;}
.login-sub{font-size:.76rem;color:var(--muted);margin-bottom:28px;}
.login-inp{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:13px 16px;font-family:'Sora',sans-serif;font-size:1.1rem;font-weight:700;text-align:center;letter-spacing:.3em;outline:none;margin-bottom:12px;color:var(--dark);}
.login-inp:focus{border-color:var(--dark);}
.login-btn{width:100%;background:var(--dark);color:#fff;border:none;border-radius:10px;padding:13px;font-family:'Sora',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;margin-bottom:10px;}
.login-btn:hover{opacity:.85;}
.login-err{color:var(--red);font-size:.74rem;min-height:20px;}
.login-hint{font-size:.65rem;color:var(--muted);margin-top:16px;line-height:1.6;}

#bolgeBar{background:var(--dark);padding:6px 16px;display:flex;align-items:center;justify-content:space-between;font-size:.68rem;}
.bb-left{color:rgba(255,255,255,.5);}
.bb-bolge{color:#fff;font-weight:700;font-size:.75rem;}
.bb-right{display:flex;align-items:center;gap:10px;}
.bb-logout{color:rgba(255,255,255,.4);cursor:pointer;font-size:.65rem;}
.bb-logout:hover{color:#fff;}

.nav{background:#22304a;display:flex;align-items:center;padding:0 12px;gap:0;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15);overflow-x:auto;}

function doLogin(){
  try{
    var inp=document.getElementById("loginInp");
    var err=document.getElementById("loginErr");
    if(!inp) return;

    var v=(inp.value||"").toString().trim();   // trim spaces
    v=v.replace(/[^0-9]/g,"");                 // allow only numbers

    if(!v){
      if(err){ err.textContent="Kod giriniz"; err.style.display="block"; setTimeout(function(){err.style.display="none";},2000); }
      inp.focus();
      return;
    }

    if(v===ADMIN_PASS){
      currentUser={isAdmin:true,kod:"8554"};
      console.log("Admin login OK");
      startApp();
      return;
    }

    if(BOLGELER[v]){
      currentUser={isAdmin:false,kod:v,bolge:BOLGELER[v].kod};
      console.log("Bolge login OK:", v);
      startApp();
      return;
    }

    if(err){ err.textContent="Geçersiz kod. (35 / 44 / 25 / 27 veya 8554)"; err.style.display="block"; }
    inp.value="";
    inp.focus();
    setTimeout(function(){ if(err) err.style.display="none"; },3000);
  }catch(ex){
    console.error("doLogin error:",ex);
    alert("Giriş hatası: "+ex.message);
  }
}

function doLogout(){
  ALL_BOLGELER.forEach(function(b){
    if(STATE[b].stRef)STATE[b].stRef.off();
    if(STATE[b].bildRef)STATE[b].bildRef.off();
    if(STATE[b].iskRef)STATE[b].iskRef.off();
    if(STATE[b].donemRef)STATE[b].donemRef.off();
    if(STATE[b].musRef)STATE[b].musRef.off();
  });
  currentUser=null;activeBolge=null;settingsUnlocked=false;
  document.getElementById("loginInp").value="";
  document.getElementById("bolgeBar").style.display="none";
  document.getElementById("mainNav").style.display="none";
  document.getElementById("pageContainer").style.display="none";
  document.getElementById("loginScreen").style.display="flex";
}
function startApp(){
  document.getElementById("loginScreen").style.display="none";
  document.getElementById("bolgeBar").style.display="flex";
  document.getElementById("mainNav").style.display="flex";
  document.getElementById("pageContainer").style.display="block";
  if(currentUser.isAdmin){
    document.getElementById("bolgeAdi").textContent="— ADMIN";
    buildAdminNav();
    ALL_BOLGELER.forEach(function(b){loadBolge(b);});
    showBolge("izmir");
  } else {
    var b=currentUser.bolge;
    document.getElementById("bolgeAdi").textContent="— "+BOLGELER[currentUser.kod].ad;
    buildBolgeNav(b);
    loadBolge(b);
    ensurePages(b);
    showPage("liste_"+b);
  }
}

// ── BÖLGE YÜKLE ──
function loadBolge(b){
  var stRef=db.ref("adel_status_"+b);
  stRef.on("value",function(s){STATE[b].statusMap=s.val()||{};setSyncStatus("synced","Canli senkron");drawListe(b);},function(){setSyncStatus("error","Hata");});
  STATE[b].stRef=stRef;
  var bildRef=db.ref("adel_bildirim_"+b);
  bildRef.on("value",function(s){STATE[b].bildirimMap=s.val()||{};drawListe(b);});
  STATE[b].bildRef=bildRef;
  var iskRef=db.ref("adel_iskonto_"+b);
  iskRef.on("value",function(s){var d=s.val();if(d&&d.length)STATE[b].odeme=d;});
  STATE[b].iskRef=iskRef;
  var donemRef=db.ref("adel_donem_"+b);
  donemRef.on("value",function(s){var d=s.val();if(d){STATE[b].donemCfg=d;updateDonemBaslik(b);}});
  STATE[b].donemRef=donemRef;
  var musRef=db.ref("adel_musteriler_"+b);
  musRef.on("value",function(s){
    var d=s.val();
    if(!d){var def=BOLGE_DEFAULT_MUS[b];if(def&&def.length){musRef.set(def);STATE[b].musteriler=def.slice();}else STATE[b].musteriler=[];}
    else STATE[b].musteriler=Array.isArray(d)?d:Object.values(d);
    STATE[b].phones={};
    var data=BOLGE_DATA[b];
    for(var i=0;i<data.length;i++){
      for(var j=0;j<STATE[b].musteriler.length;j++){
        if(normalize(STATE[b].musteriler[j].adi)===normalize(data[i].musteri)&&STATE[b].musteriler[j].tel){STATE[b].phones[i]=STATE[b].musteriler[j].tel;break;}
      }
    }
    drawListe(b);
  });
  STATE[b].musRef=musRef;
}

function showBolge(b){
  activeBolge=b;
  document.querySelectorAll(".bolge-tab").forEach(function(t){t.classList.remove("active");});
  var btab=document.getElementById("btab_"+b);if(btab)btab.classList.add("active");
  document.querySelectorAll(".sub-tab").forEach(function(t){t.remove();});
  // Alt sekmeler ekle
  var nav=document.getElementById("mainNav");
  var ayarTab=document.getElementById("tab_ayarlar");
  var sep=document.createElement("div");sep.className="nav-sep sub-tab";
  var s1=document.createElement("div");s1.className="nav-tab sub-tab";s1.id="stab_liste_"+b;s1.innerHTML="&#128203; Liste";s1.onclick=function(){showPage("liste_"+b);};
  var s2=document.createElement("div");s2.className="nav-tab sub-tab";s2.id="stab_mus_"+b;s2.innerHTML="&#128100; Musteriler";s2.onclick=function(){showPage("musteriler_"+b);};
  nav.insertBefore(sep,ayarTab);nav.insertBefore(s1,ayarTab);nav.insertBefore(s2,ayarTab);
  ensurePages(b);
  showPage("liste_"+b);
}
function showPage(pid){
  document.querySelectorAll(".page").forEach(function(p){p.classList.remove("active");});
  document.querySelectorAll(".nav-tab").forEach(function(t){t.classList.remove("active");});
  var el=document.getElementById("page_"+pid);
  if(el)el.classList.add("active");
  var tabs=["tab_"+pid,"tab_liste_"+pid.replace("liste_",""),"tab_musteriler_"+pid.replace("musteriler_",""),"stab_"+pid,"btab_"+pid.replace("liste_","").replace("musteriler_",""),"tab_ayarlar"];
  tabs.forEach(function(t){var el=document.getElementById(t);if(el)el.classList.add("active");});
  if(pid.indexOf("musteriler_")===0){drawMusteriler(pid.replace("musteriler_",""));}
  if(pid==="ayarlar"){
    if(settingsUnlocked&&document.getElementById("ayarBolgeSelect"))loadAyarBolge();
  }
}

// ── FİLTRE & LİSTE ──
function setFilter(b,f){
  STATE[b].activeFilter=f;
  ["fAll","fBek","fPaid","fPart","fIptal","fVadeli","fBildirim"].forEach(function(id,i){
    var el=document.getElementById(id+"_"+b);if(el)el.classList.remove("active");
  });
  var names=["fAll","fBek","fPaid","fPart","fIptal","fVadeli","fBildirim"];
  var el=document.getElementById(names[f]+"_"+b);if(el)el.classList.add("active");
  STATE[b].pg=1;applyFilters(b);
}
function applyFilters(b){
  var data=BOLGE_DATA[b],q=normalize((document.getElementById("sinp_"+b)||{value:""}).value||""),f=STATE[b].activeFilter;
  STATE[b].fil=data.filter(function(m,i){
    var st=(STATE[b].statusMap[i]&&STATE[b].statusMap[i].status)||"bekliyor";
    var ok=f===0||(f===1&&st==="bekliyor")||(f===2&&st==="paid")||(f===3&&st==="partial")||(f===4&&st==="iptal")||(f===5&&st==="vadeli")||(f===6&&STATE[b].bildirimMap[i]);
    return(!q||normalize(m.musteri).indexOf(q)>=0)&&ok;
  });
  drawListe(b);
}

function drawListe(b){
  var data=BOLGE_DATA[b],st=STATE[b];
  if(!st.fil||!st.fil.length)st.fil=data.slice();
  var s=(st.pg-1)*20,slice=st.fil.slice(s,s+20);
  var tb=document.getElementById("tbody_"+b);if(!tb)return;
  var html="",paidC=0,partialC=0,iptalC=0,vadeliC=0,bildirimC=0;
  for(var gi=0;gi<data.length;gi++){
    var gst=(st.statusMap[gi]&&st.statusMap[gi].status)||"bekliyor";
    if(gst==="paid")paidC++;else if(gst==="partial")partialC++;else if(gst==="iptal")iptalC++;else if(gst==="vadeli")vadeliC++;
    if(st.bildirimMap[gi])bildirimC++;
  }
  for(var i=0;i<slice.length;i++){
    var m=slice[i],fi=s+i,gi2=data.indexOf(m);
    var stObj=st.statusMap[gi2]||{},stVal=stObj.status||"bekliyor";
    var partial=stObj.partial||"",vadeliT=stObj.vadeliTarih||(stVal==="vadeli"?st.donemCfg.vadeliTarih:"");
    var custIsk=(stObj.iskonto!=null)?stObj.iskonto:m.iskonto,net=m.tutar*(1-custIsk/100);
    var paidDonem=stObj.paidDonem||"",isBild=st.bildirimMap[gi2]||false;
    var trCls=stVal==="paid"?" class=\"st-paid\"":stVal==="iptal"?" class=\"st-iptal\"":stVal==="partial"?" class=\"st-partial\"":stVal==="vadeli"?" class=\"st-vadeli\"":"";
    var nCls=stVal==="paid"?" paid":stVal==="iptal"?" iptal":stVal==="partial"?" partial":stVal==="vadeli"?" vadeli":"";
    html+="<tr"+trCls+"><td class=\"tdno\">"+(fi+1)+"</td>";
    html+="<td class=\"tdm"+nCls+"\" data-label=\"Musteri\">"+escH(m.musteri)+"</td>";
    html+="<td class=\"tdt\" data-label=\"Brut\">&#8378;"+tl(m.tutar)+"</td>";
    html+="<td data-label=\"Iskonto\"><input class=\"isk-edit-inp\" type=\"number\" min=\"0\" max=\"99\" value=\""+custIsk+"\" data-b=\""+b+"\" data-gidx=\""+gi2+"\" data-tutar=\""+m.tutar+"\" onchange=\"changeIskonto(this)\"></td>";
    html+="<td class=\"tdnet"+(stVal==="iptal"?" iptal":"")+"\" data-label=\"Net\">&#8378;"+tl(net)+"</td>";
    html+="<td class=\"status-cell\" data-label=\"Durum\">";
    html+="<select class=\"status-select "+stVal+"\" data-b=\""+b+"\" data-gidx=\""+gi2+"\" onchange=\"changeStatus(this)\">";
    ["bekliyor","paid","partial","iptal","vadeli"].forEach(function(v,vi){
      var labels=["&#9679; Bekliyor","&#10003; Odedi","&#9680; Kismi","&#10005; Iptal","&#128197; Vadeli"];
      html+="<option value=\""+v+"\""+( stVal===v?" selected":"")+">"+labels[vi]+"</option>";
    });
    html+="</select>";
    html+="<div class=\"partial-wrap"+(stVal==="partial"?" show":"")+"\">";
    html+="<input class=\"partial-inp\" type=\"text\" placeholder=\"Odenen tutar\" value=\""+escH(partial)+"\" data-b=\""+b+"\" data-gidx=\""+gi2+"\" onchange=\"changePartial(this)\"></div>";
    html+="<div class=\"vadeli-wrap"+(stVal==="vadeli"?" show":"")+"\">";
    html+="<input class=\"vadeli-inp\" type=\"date\" value=\""+vadeliT+"\" data-b=\""+b+"\" data-gidx=\""+gi2+"\" onchange=\"changeVadeli(this)\"></div>";
    html+="</td>";
    html+="<td class=\"paid-donem-cell\" data-label=\"Odeme Donemi\">";
    if(stVal==="paid"||stVal==="partial")html+="<input class=\"paid-donem-inp\" type=\"text\" placeholder=\"Donem...\" value=\""+escH(paidDonem)+"\" data-b=\""+b+"\" data-gidx=\""+gi2+"\" onchange=\"changePaidDonem(this)\">";
    else html+="<span style=\"font-size:.65rem;color:var(--muted)\">—</span>";
    html+="</td>";
    html+="<td style=\"text-align:center\" data-label=\"Bildirim\">";
    html+="<input type=\"checkbox\" class=\"bildchk\" id=\"bild_"+b+"_"+gi2+"\" data-b=\""+b+"\" data-gidx=\""+gi2+"\""+( isBild?" checked":"")+">"+
          "<label class=\"bildlbl\" for=\"bild_"+b+"_"+gi2+"\"><span class=\"bild-box\">"+(isBild?"&#10003;":"")+
          "</span><span class=\"bild-txt\">"+(isBild?"Yapildi":"Yapilmadi")+"</span></label></td>";
    html+="<td class=\"tdbtns\"><button class=\"bpng\" data-b=\""+b+"\" data-idx=\""+gi2+"\" data-tip=\"png\">&#128247; PNG</button>";
    html+="<button class=\"bpdf\" data-b=\""+b+"\" data-idx=\""+gi2+"\" data-tip=\"pdf\">&#128196; PDF</button>";
    if(st.phones[gi2])html+="<button class=\"bwa\" data-b=\""+b+"\" data-idx=\""+gi2+"\">&#128242; WA</button>";
    html+="</td></tr>";
  }
  tb.innerHTML=html;
  var g=function(id){return document.getElementById(id);};
  if(g("pToplam_"+b))g("pToplam_"+b).textContent=data.length+" musteri";
  if(g("pPaid_"+b))g("pPaid_"+b).textContent=paidC+" odedi";
  if(g("pPartial_"+b))g("pPartial_"+b).textContent=partialC+" kismi";
  if(g("pIptal_"+b))g("pIptal_"+b).textContent=iptalC+" iptal";
  if(g("pVadeli_"+b))g("pVadeli_"+b).textContent=vadeliC+" vadeli";
  if(g("pBildirim_"+b))g("pBildirim_"+b).textContent=bildirimC+" bildirim";
  updateDonemBaslik(b);
  attachListeners(b);
  drawPag(b);
}
function updateDonemBaslik(b){var el=document.getElementById("dBaslik_"+b);if(el&&STATE[b].donemCfg.donem)el.textContent=STATE[b].donemCfg.donem+" "+STATE[b].donemCfg.yil+" Odeme Listesi";}

function attachListeners(b){
  document.querySelectorAll(".bpng[data-b='"+b+"'],.bpdf[data-b='"+b+"']").forEach(function(btn){
    btn.onclick=function(){dl(b,parseInt(this.getAttribute("data-idx")),this.getAttribute("data-tip"),this);};
  });
  document.querySelectorAll(".bwa[data-b='"+b+"']").forEach(function(btn){
    btn.onclick=function(){handleWA(b,parseInt(this.getAttribute("data-idx")),this);};
  });
  document.querySelectorAll(".bildchk[data-b='"+b+"']").forEach(function(chk){
    chk.onchange=function(){
      var gi=parseInt(this.getAttribute("data-gidx"));
      STATE[b].bildirimMap[gi]=this.checked;
      var lbl=document.querySelector("label[for='bild_"+b+"_"+gi+"']");
      if(lbl){lbl.querySelector(".bild-box").innerHTML=this.checked?"&#10003;":"";lbl.querySelector(".bild-txt").textContent=this.checked?"Yapildi":"Yapilmadi";}
      var cnt=Object.keys(STATE[b].bildirimMap).filter(function(k){return STATE[b].bildirimMap[k];}).length;
      var pill=document.getElementById("pBildirim_"+b);if(pill)pill.textContent=cnt+" bildirim";
      STATE[b].bildRef.set(STATE[b].bildirimMap);
    };
  });
}

function changeStatus(sel){
  var b=sel.getAttribute("data-b"),gi=parseInt(sel.getAttribute("data-gidx")),val=sel.value;
  sel.className="status-select "+val;
  if(!STATE[b].statusMap[gi])STATE[b].statusMap[gi]={};
  STATE[b].statusMap[gi].status=val;
  var pw=sel.parentElement.querySelector(".partial-wrap"),vw=sel.parentElement.querySelector(".vadeli-wrap");
  if(val==="partial")pw.classList.add("show");else pw.classList.remove("show");
  if(val==="vadeli"){vw.classList.add("show");var vi=vw.querySelector(".vadeli-inp");if(vi&&!vi.value)vi.value=STATE[b].donemCfg.vadeliTarih||"2026-09-30";}else vw.classList.remove("show");
  var tr=sel.closest("tr");
  tr.className=val==="paid"?"st-paid":val==="iptal"?"st-iptal":val==="partial"?"st-partial":val==="vadeli"?"st-vadeli":"";
  tr.querySelector(".tdm").className="tdm"+(val==="paid"?" paid":val==="iptal"?" iptal":val==="partial"?" partial":val==="vadeli"?" vadeli":"");
  if(val==="paid"||val==="partial"){if(!STATE[b].statusMap[gi].paidDonem)STATE[b].statusMap[gi].paidDonem=STATE[b].donemCfg.donem+(STATE[b].donemCfg.yil?" "+STATE[b].donemCfg.yil:"");}
  else STATE[b].statusMap[gi].paidDonem="";
  STATE[b].stRef.set(STATE[b].statusMap,function(e){setSyncStatus(e?"error":"synced",e?"Hata":"Kaydedildi");});
  drawListe(b);
}
function changePartial(inp){var b=inp.getAttribute("data-b"),gi=parseInt(inp.getAttribute("data-gidx"));if(!STATE[b].statusMap[gi])STATE[b].statusMap[gi]={};STATE[b].statusMap[gi].partial=inp.value;STATE[b].stRef.set(STATE[b].statusMap);}
function changeVadeli(inp){var b=inp.getAttribute("data-b"),gi=parseInt(inp.getAttribute("data-gidx"));if(!STATE[b].statusMap[gi])STATE[b].statusMap[gi]={};STATE[b].statusMap[gi].vadeliTarih=inp.value;STATE[b].stRef.set(STATE[b].statusMap);}
function changePaidDonem(inp){var b=inp.getAttribute("data-b"),gi=parseInt(inp.getAttribute("data-gidx"));if(!STATE[b].statusMap[gi])STATE[b].statusMap[gi]={};STATE[b].statusMap[gi].paidDonem=inp.value;STATE[b].stRef.set(STATE[b].statusMap);}
function changeIskonto(inp){
  var b=inp.getAttribute("data-b"),gi=parseInt(inp.getAttribute("data-gidx")),val=parseFloat(inp.value);
  if(isNaN(val))return;
  if(!STATE[b].statusMap[gi])STATE[b].statusMap[gi]={};
  STATE[b].statusMap[gi].iskonto=val;
  var net=parseFloat(inp.getAttribute("data-tutar"))*(1-val/100);
  var nc=inp.closest("tr").querySelector(".tdnet");if(nc)nc.textContent="\u20ba"+tl(net);
  STATE[b].stRef.set(STATE[b].statusMap);
}

function drawPag(b){
  var fil=STATE[b].fil,pg=STATE[b].pg||1,total=Math.ceil(fil.length/20);
  var pag=document.getElementById("pag_"+b);if(!pag)return;
  if(total<=1&&fil.length<=20){pag.innerHTML="";return;}
  var s=(pg-1)*20,e=Math.min(s+20,fil.length);
  var h="<button class=\"pb\" "+(pg<=1?"disabled":"")+' onclick="STATE[''+b+''].pg='+(pg-1)+';drawListe(''+b+'')">&#8592;</button>';
  for(var i=1;i<=total;i++){
    if(i===1||i===total||Math.abs(i-pg)<=2)h+='<button class="pb'+(i===pg?" act":"")+'" onclick="STATE[''+b+''].pg='+i+';drawListe(''+b+'')">'+i+'</button>';
    else if(Math.abs(i-pg)===3)h+='<span style="padding:0 3px;color:var(--muted)">...</span>';
  }
  h+="<button class=\"pb\" "+(pg>=total?"disabled":"")+' onclick="STATE[''+b+''].pg='+(pg+1)+';drawListe(''+b+'')">&#8594;</button>';
  pag.innerHTML='<span class="paginfo">'+(s+1)+"&ndash;"+e+" / "+fil.length+' gosteriliyor</span><div class="pagbtns">'+h+'</div>';
}

// ── MÜŞTERİLER ──
function drawMusteriler(b){
  var q=normalize((document.getElementById("mSinp_"+b)||{value:""}).value||"");
  mFil[b]=STATE[b].musteriler.filter(function(m){return !q||normalize(m.adi||"").indexOf(q)>=0||normalize(m.il||"").indexOf(q)>=0||normalize(m.ilce||"").indexOf(q)>=0;});
  var pill=document.getElementById("mPill_"+b);if(pill)pill.textContent=STATE[b].musteriler.length+" musteri";
  var tb=document.getElementById("mTbody_"+b);if(!tb)return;
  var s=(mPg[b]-1)*20,slice=mFil[b].slice(s,s+20),html="";
  for(var i=0;i<slice.length;i++){
    var m=slice[i],fi=s+i,sAkt=getSonAktivite(b,m.adi);
    html+="<tr><td class=\"tdno\">"+(fi+1)+"</td><td class=\"tdm\">"+escH(m.adi||"")+"</td>";
    html+="<td class=\"tdd\">"+escH(m.il||"—")+"</td><td class=\"tdd\">"+escH(m.ilce||"—")+"</td>";
    html+="<td><span style=\"font-family:'JetBrains Mono',monospace;font-size:.68rem;\">"+escH(m.tel||"—")+"</span></td>";
    html+="<td>"+sAkt+"</td>";
    html+="<td><button onclick=\"openMusteri('"+b+"',"+fi+")\" style=\"background:none;border:1px solid var(--border);border-radius:5px;padding:3px 8px;font-size:.63rem;font-weight:600;cursor:pointer;color:var(--muted)\">Duzenle</button></td></tr>";
  }
  tb.innerHTML=html;
  var total=Math.ceil(mFil[b].length/20),pg=mPg[b]||1,pag=document.getElementById("mPag_"+b);
  if(!pag)return;
  if(total<=1){pag.innerHTML="";return;}
  var ss=(pg-1)*20,ee=Math.min(ss+20,mFil[b].length);
  var h="<button class=\"pb\" "+(pg<=1?"disabled":"")+' onclick="mPg[''+b+'']='+(pg-1)+';drawMusteriler(''+b+'')">&#8592;</button>';
  for(var j=1;j<=total;j++)if(j===1||j===total||Math.abs(j-pg)<=2)h+='<button class="pb'+(j===pg?" act":"")+'" onclick="mPg[''+b+'\']='+j+';drawMusteriler(''+b+'')">'+j+'</button>';
  h+="<button class=\"pb\" "+(pg>=total?"disabled":"")+' onclick="mPg[''+b+'']='+(pg+1)+';drawMusteriler(''+b+'')">&#8594;</button>';
  pag.innerHTML='<span class="paginfo">'+(ss+1)+"&ndash;"+ee+" / "+mFil[b].length+' gosteriliyor</span><div class="pagbtns">'+h+'</div>';
}
function getSonAktivite(b,adi){
  var data=BOLGE_DATA[b];
  for(var i=0;i<data.length;i++){
    if(normalize(data[i].musteri)===normalize(adi)){
      var st=(STATE[b].statusMap[i]&&STATE[b].statusMap[i].status)||"bekliyor",pd=(STATE[b].statusMap[i]&&STATE[b].statusMap[i].paidDonem)||"";
      if(st==="paid")return '<span style="color:var(--green);font-weight:700;font-size:.68rem;">&#10003; '+escH(pd||STATE[b].donemCfg.donem)+'</span>';
      if(st==="partial")return '<span style="color:#7b5ea7;font-weight:700;font-size:.68rem;">&#9680; Kismi</span>';
      if(st==="iptal")return '<span style="color:var(--red);font-size:.68rem;">&#10005; Iptal</span>';
      if(st==="vadeli")return '<span style="color:#1a6b8a;font-size:.68rem;">&#128197; Vadeli</span>';
      return '<span style="color:var(--muted);font-size:.68rem;">Bekliyor</span>';
    }
  }
  return '<span style="color:var(--muted);font-size:.68rem;">—</span>';
}

  document.getElementById("mModalTitle").textContent=fi>=0?"Musteri Duzenle":"Yeni Musteri";

  document.getElementById("mIl").value=m.il||"";
  document.getElementById("mIlce").value=m.ilce||"";
  document.getElementById("mTel").value=m.tel||"";

function closeMusteri(){document.getElementById("mModal").style.display="none";}
function saveMusteri(){
  var b=mEditB,adi=document.getElementById("mAdi").value.trim();
  if(!adi){alert("Ad zorunlu!");return;}
  var obj={adi:adi,il:document.getElementById("mIl").value.trim(),ilce:document.getElementById("mIlce").value.trim(),tel:document.getElementById("mTel").value.trim()};
  var list=STATE[b].musteriler.slice();
  if(mEditIdx>=0){var orig=mFil[b][mEditIdx];var idx=-1;for(var i=0;i<list.length;i++){if(normalize(list[i].adi)===normalize(orig.adi)){idx=i;break;}}if(idx>=0)list[idx]=obj;else list.push(obj);}
  else list.push(obj);

function importExcel(b,inp){
  var file=inp.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(e.target.result,{type:"binary"});
      var rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:""});
      if(rows.length<2){alert("Excel bos!");return;}
      var added=0,updated=0,list=STATE[b].musteriler.slice();
      for(var i=1;i<rows.length;i++){
        var r=rows[i],mAdi=String(r[0]||"").trim();if(!mAdi)continue;
        var tutar=parseFloat(String(r[4]||"0").replace(",",".")),isk=parseFloat(String(r[5]||"0").replace(",","."));
        var data=BOLGE_DATA[b];
        for(var di=0;di<data.length;di++){if(normalize(data[di].musteri)===normalize(mAdi)){if(!isNaN(tutar)&&tutar>0)data[di].tutar=tutar;if(!isNaN(isk)&&isk>=0)data[di].iskonto=isk;break;}}
        var found=false;
        for(var mi=0;mi<list.length;mi++){
          if(normalize(list[mi].adi)===normalize(mAdi)){list[mi]={adi:mAdi,il:String(r[1]||"").trim(),ilce:String(r[2]||"").trim(),tel:String(r[3]||"").trim()};updated++;found=true;break;}
        }
        if(!found){list.push({adi:mAdi,il:String(r[1]||"").trim(),ilce:String(r[2]||"").trim(),tel:String(r[3]||"").trim()});added++;}
      }
      STATE[b].musRef.set(list,function(err){if(!err){alert(updated+" guncellendi, "+added+" eklendi.");inp.value="";}});
    }catch(err){alert("Hata: "+err.message);}
  };
  reader.readAsBinaryString(file);
}
function exportExcel(b){
  var data=BOLGE_DATA[b],st=STATE[b];
  var lbl={bekliyor:"Bekliyor",paid:"Odedi",partial:"Kismi",iptal:"Iptal",vadeli:"Vadeli"};
  var rows=[["#","Musteri","Il","Ilce","Telefon","Brut","Iskonto%","Net","Durum","OdemeDonemi","KismiTutar","Vade","Bildirim"]];
  for(var i=0;i<data.length;i++){
    var m=data[i],so=st.statusMap[i]||{},sv=so.status||"bekliyor";
    var ci=(so.iskonto!=null)?so.iskonto:m.iskonto,net=m.tutar*(1-ci/100);
    var mus=null;for(var j=0;j<st.musteriler.length;j++){if(normalize(st.musteriler[j].adi)===normalize(m.musteri)){mus=st.musteriler[j];break;}}mus=mus||{};
    rows.push([i+1,m.musteri,mus.il||"",mus.ilce||"",mus.tel||"",m.tutar.toFixed(2).replace(".",","),ci,net.toFixed(2).replace(".",","),lbl[sv]||sv,so.paidDonem||"",so.partial||"",so.vadeliTarih||"",st.bildirimMap[i]?"Evet":"Hayir"]);
  }
  var csv=rows.map(function(r){return r.map(function(v){var s=String(v);if(s.indexOf(",")>=0||s.indexOf(";")>=0||s.indexOf('"')>=0)s='"'+s.replace(/"/g,'""')+'"';return s;}).join(";");}).join("\r\n");
  var blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
  var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="adel-"+b+"-"+st.donemCfg.donem+".csv";a.click();
}

function dl(b,gi,tip,btn){
  var m=BOLGE_DATA[b][gi];if(!m){alert("Bulunamadi.");return;}
  btn.disabled=true;btn.textContent="...";
  var rc=document.getElementById("rc");
  rc.innerHTML=buildCard(b,gi);rc.style.cssText="width:900px;min-width:900px;font-size:16px;";
  setTimeout(function(){
    renderCanvas(rc,function(canvas){
      var safe=makeSafe(m.musteri);
      if(tip==="png"){var a=document.createElement("a");a.download=safe+"-odeme.png";a.href=canvas.toDataURL("image/png");a.click();}
      else{var img=canvas.toDataURL("image/png");var pdf=new window.jspdf.jsPDF({orientation:"portrait",unit:"px",format:[canvas.width/2,canvas.height/2]});pdf.addImage(img,"PNG",0,0,canvas.width/2,canvas.height/2);pdf.save(safe+"-odeme.pdf");}
      rc.innerHTML="";btn.textContent="OK";
      setTimeout(function(){btn.disabled=false;btn.innerHTML=tip==="png"?"&#128247; PNG":"&#128196; PDF";},2000);
    });
  },250);
}
function handleWA(b,gi,btn){
  var m=BOLGE_DATA[b][gi],phone=STATE[b].phones[gi];if(!phone)return;
  btn.disabled=true;btn.textContent="...";
  var rc=document.getElementById("rc");
  rc.innerHTML=buildCard(b,gi);rc.style.cssText="width:900px;min-width:900px;font-size:16px;";
  var cfg=STATE[b].donemCfg;
  setTimeout(function(){
    renderCanvas(rc,function(canvas){
      var safe=makeSafe(m.musteri);
      var a=document.createElement("a");a.download=safe+"-odeme.png";a.href=canvas.toDataURL("image/png");a.click();
      rc.innerHTML="";
      var net=m.tutar*(1-m.iskonto/100);
      var msg="Sayin "+m.musteri+",\n\n"+cfg.donem+" "+cfg.yil+" aktivitesi odeme bildiriminiz ekte yer almaktadir.\n\nIskonto sonrasi: "+tl(net)+" TL\nNakit: "+cfg.nakitTarih+"\nKart: "+cfg.kartTarih+"\n\nhttps://adel.tahsildar.com.tr\n0549 625 24 34";
      setTimeout(function(){window.open("https://wa.me/"+phone+"?text="+encodeURIComponent(msg),"_blank");btn.disabled=false;btn.innerHTML="&#128242; WA";},1200);
    });
  },250);
}
